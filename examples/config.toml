# Example prismaquant-llama user config.
# Copy to ~/.prismaquant-llama/config/config.toml to use, then edit.
#
# All sections + keys are OPTIONAL. Missing values fall through to the
# built-in dataclass defaults. Comment out or delete anything you don't
# care about.
#
# Precedence: CLI flag > this file > built-in default.
#
# This is a TOML file. Common gotchas:
#   - strings need quotes: priority = "333" (not 333)
#   - paths can use ~ for home: output_root = "~/quants"
#   - booleans are lowercase: no_mmap = true (not True)


[paths]
# Where prismaquant-llama keeps working files. ~ expands to your home dir.
# Defaults are subdirs of ~/.prismaquant-llama/.
# output_root  = "~/.prismaquant-llama/builds"
# hf_cache     = "~/.prismaquant-llama/cache/hf"
# binary_cache = "~/.prismaquant-llama/cache/binary-types"
# scratch      = "~/.prismaquant-llama/scratch"
# calibration  = "~/.prismaquant-llama/cache/calibration"


[binaries]
# Default binary set. Multiple sets can be registered (see below);
# this picks which one is used when --binary isn't passed on the CLI.
# default_set = "mainline"

# [binaries.mainline]
# quantize      = "/path/to/llama.cpp/build/bin/llama-quantize"
# imatrix       = "/path/to/llama.cpp/build/bin/llama-imatrix"
# perplexity    = "/path/to/llama.cpp/build/bin/llama-perplexity"
# bench         = "/path/to/llama.cpp/build/bin/llama-bench"
# quantize_cost = "/path/to/llama.cpp/build/bin/llama-quantize-cost"

# [binaries.frankenturbo2]
# quantize      = "/path/to/llama-fork/build/bin/llama-quantize"
# imatrix       = "/path/to/llama-fork/build/bin/llama-imatrix"
# perplexity    = "/path/to/llama-fork/build/bin/llama-perplexity"
# bench         = "/path/to/llama-fork/build/bin/llama-bench"
# quantize_cost = "/path/to/llama-fork/build/bin/llama-quantize-cost"


[defaults]
# Pipeline-run defaults. Each is overridable via CLI.

# Target file size as a fraction of BF16 size. 0.25 = ~1/4 of BF16,
# similar to Q4_K_M territory but with prismaquant's per-tensor mixing.
# budget_auto_ratio = 0.25

# Allocator wiggle room around budget (GB).
# budget_band_gb = 0.25

# 3-digit XYZ priority — sums to 9. PPL/TG/PP weighting.
# priority = "333"

# Calibration corpus path. If set, --calibration becomes optional on the CLI.
# calibration_corpus = "~/.prismaquant-llama/cache/calibration/bartowski-calibration-v3.txt"

# Stage D imatrix chunks (default 200) and Stage I PPL eval chunks (default 100).
# chunks_imatrix = 200
# chunks_eval    = 100

# Default context length for imatrix + eval.
# ctx = 4096

# If true, default behavior is --no-mmap (faster on systems where mmap
# is slow). User can override per-run with --mmap.
# no_mmap = false


[huggingface]
# HF-related preferences. Token is NOT stored here — use ~/.cache/huggingface/token
# (standard HF location). This section is for behavior tweaks.
# default_revision = "main"
# download_resume  = true


[wizard]
# Preferences for the interactive TUI wizard.
# setup_complete    = false   # set to true after wizard completes Phase 1
# auto_suggest_perf = true    # offer perf-file calibration after Phase 1
# disk_warn_pct     = 10      # warn if free disk < estimated * (1 + this/100)
